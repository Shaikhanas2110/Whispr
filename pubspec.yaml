name: whispr
description: Anonymous Social Community App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  flutter_displaymode: ^0.6.0
  flutter_markdown: ^0.7.1
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.2.2
  image_cropper: ^7.0.1
  video_player: ^2.8.3
  timeago: ^3.6.1
  uuid: ^4.3.3
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^7.0.0
  in_app_purchase: ^3.1.13
  dio: ^5.4.3
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  rive: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/welcome2.riv
    - assets/images/search.riv
    - assets/images/search2.riv
    - assets/images/add.riv
    - assets/images/add2.riv
    - assets/images/welcome3.riv
    - assets/images/onboarding/

